version: '3.9'

services:
  # Mongodb service
  mongo_db:
    container_name: db_container
    image: mongo:latest
    ports:
      - 27017:27017
    restart: always
    volumes:
      - mongo_data:/data/db

  # Node api service
  api:
    image: nodeapp
    env_file: .env
    ports:
      - 3030:3030
    depends_on: 
      - mongo_db

  # Sentiment analyzer microservice
  sentiment:
    build:
      context: ../djangoapp/microservices
      dockerfile: Dockerfile
    ports:
      - 5050:5000

volumes:
  mongo_data: {}
